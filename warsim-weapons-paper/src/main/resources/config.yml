weapons:
  enabled: true
  input:
    fire-action: "RIGHT_CLICK"
    reload-action: "DROP_KEY"
    cancel-vanilla-drop-when-reloading: true
    cancel-vanilla-interaction-when-armed: true
  behavior:
    allow-self-damage: false
    require-playing-state: true
    require-active-participant: true
    require-roster-assignment: true
  ballistics:
    maximum-candidates-per-shot: 100
    maximum-range: 200.0
    maximum-delta-millis: 250
    head-height-ratio: 0.25
    epsilon: 0.000001
  state:
    reload-check-interval-ticks: 2
    disconnect-retention-seconds: 0
  definitions:
    wrench_m1895_rifle:
      display-name: "Wrench M1895 Rifle"
      category: "RIFLE"
      fire-mode: "SEMI_AUTO"
      craftengine-item-id: "warsim:wrench_m1895_rifle"
      ammo: { magazine-size: 5, reserve-ammo: 40, reload-millis: 2600 }
      firing: { rounds-per-minute: 55, maximum-range: 180.0, hip-spread-degrees: 0.30 }
      damage:
        head-multiplier: 1.8
        points:
